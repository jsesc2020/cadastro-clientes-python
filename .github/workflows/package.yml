name: Build Packages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Force actions to run on Node.js 24 to avoid Node.js 20 deprecation issues
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  windows:
    name: Build Windows packages
    # use the new specific image to avoid redirect warnings
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4
      - name: Debug runner (Windows)
        shell: powershell
        run: |
          Write-Host '=== Runner info ==='
          Write-Host (Get-Item env:PROCESSOR_ARCHITECTURE).Value
          node --version 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host 'node not found' }
          python --version 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host 'python not found' }
          py -3 --version 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host 'py launcher not found' }
          Write-Host '=== PATH sample ==='
          $env:PATH.Split(';')[0..10] -join ';'
          Write-Host '=== where checks ==='
          cmd /c "where makensis || echo makensis-not-found"
          cmd /c "where candle || echo candle-not-found"
          cmd /c "where light || echo light-not-found"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Windows packaging tools (NSIS, WiX)
        run: |
          choco install nsis wixtoolset -y
          refreshenv
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python_app/requirements.txt
      - name: Build Windows executable
        # run the .bat with cmd to avoid PowerShell execution issues
        run: cmd /c "cd python_app && build_exe_windows.bat"
      - name: Build NSIS installer
        shell: powershell
        run: |
          cd python_app
          .\installer\build_windows_installer.ps1
      - name: Build MSI installer
        shell: powershell
        run: |
          cd python_app
          .\installer\build_msi.ps1
      - name: Run Python tests
        run: |
          cd python_app
          python -m pytest -q server/tests/test_app.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            python_app/dist/**

  linux:
    name: Build Linux packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug runner (Linux)
        run: |
          echo '=== Runner info ==='
          uname -a || true
          node --version 2>/dev/null || echo 'node not found'
          python3 --version 2>/dev/null || echo 'python3 not found'
          which py || true
          echo '=== PATH sample ==='
          echo $PATH | tr ':' '\n' | sed -n '1,10p'
          echo '=== which checks ==='
          which makensis || echo makensis-not-found
          which candle || echo candle-not-found
          which light || echo light-not-found
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python_app/requirements.txt
      - name: Build Linux executable
        run: |
          cd python_app
          chmod +x build_exe_linux.sh
          ./build_exe_linux.sh
      - name: Build DEB package
        run: |
          cd python_app
          chmod +x installer/build_deb.sh
          bash installer/build_deb.sh
      - name: Run Python tests
        run: |
          cd python_app
          python -m pytest -q server/tests/test_app.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            python_app/dist/**
