name: Build Packages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  windows:
    name: Build Windows packages
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Windows packaging tools
        run: |
          choco install pyinstaller nsis wixtoolset -y
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python_app/requirements.txt
      - name: Build Windows executable
        run: |
          cd python_app
          build_exe_windows.bat
      - name: Build NSIS installer
        run: |
          cd python_app
          powershell -NoProfile -ExecutionPolicy Bypass -File installer\build_windows_installer.ps1
      - name: Build MSI installer
        run: |
          cd python_app
          powershell -NoProfile -ExecutionPolicy Bypass -File installer\build_msi.ps1
      - name: Run Python tests
        run: |
          cd python_app
          python -m pytest -q server/tests/test_app.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            python_app/dist/**

  linux:
    name: Build Linux packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python_app/requirements.txt
      - name: Build Linux executable
        run: |
          cd python_app
          chmod +x build_exe_linux.sh
          ./build_exe_linux.sh
      - name: Build DEB package
        run: |
          cd python_app
          chmod +x installer/build_deb.sh
          bash installer/build_deb.sh
      - name: Run Python tests
        run: |
          cd python_app
          python -m pytest -q server/tests/test_app.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            python_app/dist/**
