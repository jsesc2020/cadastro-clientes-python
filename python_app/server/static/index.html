<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MídiaControl — Gestão de Locação</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1e2334;
      --border: #2a3044;
      --accent: #e8b84b;
      --accent2: #3d7fff;
      --danger: #e05050;
      --success: #3ecf8e;
      --warning: #f5a623;
      --text: #e8eaf0;
      --text2: #8b92a8;
      --text3: #555e78;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 20%, #1a2240 0%, var(--bg) 60%);
    }
    .login-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 48px 40px; width: 380px;
      box-shadow: var(--shadow);
    }
    .login-logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent); margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 32px; }
    .login-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 4px; margin-bottom: 24px; }
    .login-tab { flex: 1; text-align: center; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all .2s; border: none; background: transparent; }
    .login-tab.active { background: var(--surface2); color: var(--text); font-weight: 500; }
    .form-group { margin-bottom: 16px; }
    label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 6px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
    input, select, textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent2); }
    select option { background: var(--surface); }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: var(--radius); border: none;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all .15s; text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #1a1200; }
    .btn-primary:hover { background: #f0c85a; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #0a2e1e; }
    .btn-success:hover { opacity: .88; }
    .btn-blue { background: var(--accent2); color: #fff; }
    .btn-blue:hover { opacity: .88; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .alert { padding: 10px 14px; border-radius: var(--radius); margin-bottom: 16px; font-size: 13px; }
    .alert-error { background: rgba(224,80,80,.12); border: 1px solid var(--danger); color: #f08080; }
    .alert-success { background: rgba(62,207,142,.12); border: 1px solid var(--success); color: var(--success); }

    /* APP LAYOUT */
    #app { display: none; }
    .layout { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 220px; min-height: 100vh; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    }
    .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo .brand { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); }
    .sidebar-logo .tagline { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .nav { flex: 1; padding: 12px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; cursor: pointer; font-size: 13.5px;
      color: var(--text2); transition: all .15s; border: none; background: transparent;
      width: 100%; text-align: left;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--accent); background: rgba(232,184,75,.08); border-right: 3px solid var(--accent); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
    .user-chip { font-size: 12px; color: var(--text2); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* MAIN */
    .main { margin-left: 220px; flex: 1; padding: 32px; min-height: 100vh; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); }
    .page-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 8px; }
    .stat-value { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); }
    .stat-accent { color: var(--accent); }
    .stat-blue { color: var(--accent2); }
    .stat-green { color: var(--success); }
    .stat-red { color: var(--danger); }

    /* TABLE */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .search-bar { display: flex; gap: 8px; align-items: center; }
    .search-input { padding: 8px 12px; font-size: 13px; width: 220px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: 13px 16px; font-size: 13.5px; border-bottom: 1px solid rgba(42,48,68,.5); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.015); }
    .actions-cell { display: flex; gap: 6px; }

    /* BADGE */
    .badge { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; letter-spacing: .03em; }
    .badge-ativo { background: rgba(62,207,142,.15); color: var(--success); }
    .badge-cancelado { background: rgba(224,80,80,.15); color: var(--danger); }
    .badge-finalizado { background: rgba(139,146,168,.15); color: var(--text2); }
    .badge-pendente { background: rgba(245,166,35,.15); color: var(--warning); }
    .badge-disponivel { background: rgba(62,207,142,.15); color: var(--success); }
    .badge-ocupado { background: rgba(224,80,80,.15); color: var(--danger); }
    .badge-outdoor { background: rgba(61,127,255,.15); color: var(--accent2); }
    .badge-tv { background: rgba(232,184,75,.15); color: var(--accent); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 999;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow); transform: translateY(20px); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* LOADING */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* CURRENCY */
    .mono { font-family: monospace; }

    /* Responsive */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">MídiaControl</div>
    <div class="login-sub">Gestão de locação de pontos de mídia</div>
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="login-tab" onclick="switchTab('register')">Criar conta</button>
    </div>
    <div id="auth-alert"></div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="auth-email" placeholder="seu@email.com" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()" />
    </div>
    <button class="btn btn-primary btn-full" onclick="doAuth()">
      <span id="auth-btn-text">Entrar</span>
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="brand">MídiaControl</div>
        <div class="tagline">Gestão de Locação</div>
      </div>
      <nav class="nav">
        <button class="nav-item active" onclick="navigate('dashboard')"><span class="icon">◈</span> Dashboard</button>
        <button class="nav-item" onclick="navigate('clientes')"><span class="icon">👤</span> Clientes</button>
        <button class="nav-item" onclick="navigate('pontos')"><span class="icon">📍</span> Pontos de Mídia</button>
        <button class="nav-item" onclick="navigate('contratos')"><span class="icon">📋</span> Contratos</button>
        <button class="nav-item" onclick="navigate('proprietarios')"><span class="icon">🏢</span> Proprietários</button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="sidebar-user">—</div>
        <button class="btn btn-secondary btn-full btn-sm" onclick="logout()">Sair</button>
      </div>
    </div>
    <main class="main" id="main-content"></main>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">—</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ───── STATE ─────
let TOKEN = localStorage.getItem('mc_token') || '';
let USER_EMAIL = localStorage.getItem('mc_email') || '';
let currentPage = 'dashboard';
let authMode = 'login';

// ───── API ─────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}

// ───── AUTH ─────
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.login-tab').forEach((t, i) => t.classList.toggle('active', (mode === 'login' && i === 0) || (mode === 'register' && i === 1)));
  document.getElementById('auth-btn-text').textContent = mode === 'login' ? 'Entrar' : 'Criar conta';
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const alertEl = document.getElementById('auth-alert');
  if (!email || !password) { showAlert(alertEl, 'Preencha e-mail e senha.', 'error'); return; }
  try {
    if (authMode === 'register') {
      await api('POST', '/auth/register', { email, password });
      showAlert(alertEl, 'Conta criada! Faça login.', 'success');
      switchTab('login'); return;
    }
    const data = await api('POST', '/auth/login', { email, password });
    TOKEN = data.token;
    USER_EMAIL = email;
    localStorage.setItem('mc_token', TOKEN);
    localStorage.setItem('mc_email', email);
    startApp();
  } catch (e) { showAlert(alertEl, e.message, 'error'); }
}

function showAlert(el, msg, type) {
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => { el.innerHTML = ''; }, 4000);
}

function logout() {
  TOKEN = ''; USER_EMAIL = '';
  localStorage.removeItem('mc_token'); localStorage.removeItem('mc_email');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('sidebar-user').textContent = USER_EMAIL;
  navigate('dashboard');
}

if (TOKEN) startApp();

// ───── NAVIGATION ─────
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.textContent.toLowerCase().includes(page === 'dashboard' ? '◈' : page.slice(0, 4)));
  });
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    const pages = ['dashboard', 'clientes', 'pontos', 'contratos', 'proprietarios'];
    el.classList.toggle('active', pages[i] === page);
  });
  const pages = { dashboard: renderDashboard, clientes: renderClientes, pontos: renderPontos, contratos: renderContratos, proprietarios: renderProprietarios };
  if (pages[page]) pages[page]();
}

// ───── HELPERS ─────
function fmt(cents) { return 'R$ ' + (cents / 100).toFixed(2).replace('.', ','); }
function fmtDate(d) { if (!d) return '—'; return d.split('-').reverse().join('/'); }
function badgeStatus(s) {
  const map = { ATIVO: 'ativo', CANCELADO: 'cancelado', FINALIZADO: 'finalizado', PENDENTE: 'pendente', DISPONIVEL: 'disponivel', OCUPADO: 'ocupado' };
  return `<span class="badge badge-${map[s] || ''}">${s}</span>`;
}
function badgeTipo(t) { return `<span class="badge badge-${t === 'TV' ? 'tv' : 'outdoor'}">${t}</span>`; }
function loading() { return '<div style="text-align:center;padding:40px"><div class="spinner"></div></div>'; }
function emptyState(icon, text) { return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${text}</div></div>`; }

// ───── MODAL ─────
function openModal(title, bodyHtml, footerHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-footer').innerHTML = footerHtml || '';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal')) closeModal(); }

// ───── DASHBOARD ─────
async function renderDashboard() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div class="page-header"><div><div class="page-title">Dashboard</div><div class="page-sub">Visão geral do sistema</div></div></div><div class="stats-grid" id="stats">${loading()}</div>`;
  try {
    const [clientes, pontos, contratos] = await Promise.all([
      api('GET', '/clients/'), api('GET', '/pontos/'), api('GET', '/contracts/')
    ]);
    const ativos = contratos.filter(c => c.status === 'ATIVO').length;
    const receita = contratos.filter(c => c.status === 'ATIVO').reduce((a, c) => a + c.valor_cents, 0);
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="stat-label">Clientes</div><div class="stat-value stat-blue">${clientes.length}</div></div>
      <div class="stat-card"><div class="stat-label">Pontos de mídia</div><div class="stat-value stat-accent">${pontos.length}</div></div>
      <div class="stat-card"><div class="stat-label">Contratos ativos</div><div class="stat-value stat-green">${ativos}</div></div>
      <div class="stat-card"><div class="stat-label">Receita mensal (ativos)</div><div class="stat-value" style="font-size:22px">${fmt(receita)}</div></div>
    `;
  } catch(e) { document.getElementById('stats').innerHTML = `<div style="color:var(--danger);padding:20px">${e.message}</div>`; }
}

// ───── CLIENTES ─────
async function renderClientes() {
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Clientes</div><div class="page-sub">Gestão de clientes</div></div>
      <button class="btn btn-primary" onclick="openClienteModal()">+ Novo Cliente</button>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Lista de clientes</span>
        <input class="search-input" placeholder="🔍 Buscar..." oninput="filterTable(this,'clientes-table')" />
      </div>
      <div id="clientes-table">${loading()}</div>
    </div>`;
  const rows = await api('GET', '/clients/').catch(() => []);
  const tb = document.getElementById('clientes-table');
  if (!rows.length) { tb.innerHTML = emptyState('👤', 'Nenhum cliente cadastrado'); return; }
  tb.innerHTML = `<table><thead><tr><th>Nome</th><th>Documento</th><th>Telefone</th><th>E-mail</th><th>Cadastro</th><th></th></tr></thead><tbody>
    ${rows.map(c => `<tr>
      <td><strong>${c.nome}</strong></td>
      <td>${c.documento || '—'}</td>
      <td>${c.telefone || '—'}</td>
      <td>${c.email || '—'}</td>
      <td>${fmtDate(c.created_at?.split('T')[0])}</td>
      <td><div class="actions-cell">
        <button class="btn btn-secondary btn-sm" onclick='openClienteModal(${JSON.stringify(c)})'>Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCliente(${c.id})">✕</button>
      </div></td>
    </tr>`).join('')}
  </tbody></table>`;
}

function openClienteModal(c) {
  const edit = !!c;
  openModal(edit ? 'Editar Cliente' : 'Novo Cliente', `
    <div class="form-group"><label>Nome *</label><input id="c-nome" value="${c?.nome||''}" /></div>
    <div class="form-row">
      <div class="form-group"><label>CPF / CNPJ</label><input id="c-doc" value="${c?.documento||''}" /></div>
      <div class="form-group"><label>Telefone</label><input id="c-tel" value="${c?.telefone||''}" /></div>
    </div>
    <div class="form-group"><label>E-mail</label><input id="c-email" type="email" value="${c?.email||''}" /></div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCliente(${c?.id||'null'})">${edit ? 'Salvar' : 'Criar'}</button>`);
}

async function saveCliente(id) {
  const body = { nome: document.getElementById('c-nome').value.trim(), documento: document.getElementById('c-doc').value.trim(), telefone: document.getElementById('c-tel').value.trim(), email: document.getElementById('c-email').value.trim() };
  if (!body.nome) { alert('Nome obrigatório'); return; }
  try {
    if (id) await api('PUT', `/clients/${id}`, body); else await api('POST', '/clients/', body);
    closeModal(); renderClientes();
  } catch(e) { alert(e.message); }
}

async function deleteCliente(id) {
  if (!confirm('Excluir este cliente?')) return;
  await api('DELETE', `/clients/${id}`).catch(e => alert(e.message));
  renderClientes();
}

// ───── PONTOS ─────
async function renderPontos() {
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Pontos de Mídia</div><div class="page-sub">Outdoors, TVs e outros pontos</div></div>
      <button class="btn btn-primary" onclick="openPontoModal()">+ Novo Ponto</button>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Lista de pontos</span>
        <input class="search-input" placeholder="🔍 Buscar..." oninput="filterTable(this,'pontos-table')" />
      </div>
      <div id="pontos-table">${loading()}</div>
    </div>`;
  const rows = await api('GET', '/pontos/').catch(() => []);
  const tb = document.getElementById('pontos-table');
  if (!rows.length) { tb.innerHTML = emptyState('📍', 'Nenhum ponto cadastrado'); return; }
  tb.innerHTML = `<table><thead><tr><th>Nome</th><th>Tipo</th><th>Endereço</th><th>Status</th><th>Coord.</th><th></th></tr></thead><tbody>
    ${rows.map(p => `<tr>
      <td><strong>${p.nome}</strong></td>
      <td>${badgeTipo(p.tipo)}</td>
      <td>${p.endereco || '—'}</td>
      <td>${badgeStatus(p.status)}</td>
      <td class="mono" style="font-size:12px;color:var(--text2)">${p.latitude?.toFixed(4)||'—'}, ${p.longitude?.toFixed(4)||'—'}</td>
      <td><div class="actions-cell">
        <button class="btn btn-secondary btn-sm" onclick='openPontoModal(${JSON.stringify(p)})'>Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deletePonto(${p.id})">✕</button>
      </div></td>
    </tr>`).join('')}
  </tbody></table>`;
}

function openPontoModal(p) {
  const edit = !!p;
  openModal(edit ? 'Editar Ponto de Mídia' : 'Novo Ponto de Mídia', `
    <div class="form-group"><label>Nome *</label><input id="p-nome" value="${p?.nome||''}" /></div>
    <div class="form-row">
      <div class="form-group"><label>Tipo</label>
        <select id="p-tipo">
          <option ${p?.tipo==='OUTDOOR'||!p?'selected':''}>OUTDOOR</option>
          <option ${p?.tipo==='TV'?'selected':''}>TV</option>
          <option ${p?.tipo==='PAINEL'?'selected':''}>PAINEL</option>
          <option ${p?.tipo==='BUSDOOR'?'selected':''}>BUSDOOR</option>
        </select>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="p-status">
          <option ${p?.status==='DISPONIVEL'||!p?'selected':''}>DISPONIVEL</option>
          <option ${p?.status==='OCUPADO'?'selected':''}>OCUPADO</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Endereço</label><input id="p-end" value="${p?.endereco||''}" /></div>
    <div class="form-row">
      <div class="form-group"><label>Latitude *</label><input id="p-lat" type="number" step="0.000001" value="${p?.latitude||''}" /></div>
      <div class="form-group"><label>Longitude *</label><input id="p-lng" type="number" step="0.000001" value="${p?.longitude||''}" /></div>
    </div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="savePonto(${p?.id||'null'})">${edit ? 'Salvar' : 'Criar'}</button>`);
}

async function savePonto(id) {
  const body = { nome: document.getElementById('p-nome').value.trim(), tipo: document.getElementById('p-tipo').value, status: document.getElementById('p-status').value, endereco: document.getElementById('p-end').value.trim(), latitude: parseFloat(document.getElementById('p-lat').value), longitude: parseFloat(document.getElementById('p-lng').value) };
  if (!body.nome || isNaN(body.latitude) || isNaN(body.longitude)) { alert('Nome, latitude e longitude são obrigatórios'); return; }
  try {
    if (id) await api('PUT', `/pontos/${id}`, body); else await api('POST', '/pontos/', body);
    closeModal(); renderPontos();
  } catch(e) { alert(e.message); }
}

async function deletePonto(id) {
  if (!confirm('Excluir este ponto?')) return;
  await api('DELETE', `/pontos/${id}`).catch(e => alert(e.message));
  renderPontos();
}

// ───── CONTRATOS ─────
async function renderContratos() {
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Contratos</div><div class="page-sub">Locações de pontos de mídia</div></div>
      <button class="btn btn-primary" onclick="openContratoModal()">+ Novo Contrato</button>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Lista de contratos</span>
        <input class="search-input" placeholder="🔍 Buscar..." oninput="filterTable(this,'contratos-table')" />
      </div>
      <div id="contratos-table">${loading()}</div>
    </div>`;

  const [contratos, clientes, pontos] = await Promise.all([
    api('GET', '/contracts/'), api('GET', '/clients/'), api('GET', '/pontos/')
  ]).catch(() => [[], [], []]);

  const clienteMap = Object.fromEntries(clientes.map(c => [c.id, c.nome]));
  const pontoMap = Object.fromEntries(pontos.map(p => [p.id, p.nome]));

  const tb = document.getElementById('contratos-table');
  if (!contratos.length) { tb.innerHTML = emptyState('📋', 'Nenhum contrato cadastrado'); return; }
  tb.innerHTML = `<table><thead><tr><th>#</th><th>Cliente</th><th>Ponto</th><th>Valor</th><th>Início</th><th>Término</th><th>Status</th><th></th></tr></thead><tbody>
    ${contratos.map(c => `<tr>
      <td class="mono" style="color:var(--text3)">#${c.id}</td>
      <td>${clienteMap[c.cliente_id] || `ID ${c.cliente_id}`}</td>
      <td>${pontoMap[c.ponto_id] || `ID ${c.ponto_id}`}</td>
      <td class="mono">${fmt(c.valor_cents)}</td>
      <td>${fmtDate(c.data_inicio)}</td>
      <td>${fmtDate(c.data_termino)}</td>
      <td>${badgeStatus(c.status)}</td>
      <td><div class="actions-cell">
        ${c.status === 'ATIVO' ? `<button class="btn btn-danger btn-sm" onclick="cancelContrato(${c.id})">Cancelar</button>` : ''}
        ${c.status !== 'ATIVO' ? `<button class="btn btn-success btn-sm" onclick="openRenovarModal(${c.id})">Renovar</button>` : ''}
        <button class="btn btn-secondary btn-sm" onclick='openContratoModal(${JSON.stringify(c)},${JSON.stringify(clienteMap)},${JSON.stringify(pontoMap)})'>Ver</button>
      </div></td>
    </tr>`).join('')}
  </tbody></table>`;
}

async function openContratoModal(c, clienteMap, pontoMap) {
  const clientes = await api('GET', '/clients/');
  const pontos = await api('GET', '/pontos/');
  const edit = !!c;
  openModal(edit ? `Contrato #${c.id}` : 'Novo Contrato', `
    <div class="form-group"><label>Cliente *</label>
      <select id="ct-cli">${clientes.map(cl => `<option value="${cl.id}" ${c?.cliente_id===cl.id?'selected':''}>${cl.nome}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Ponto de Mídia *</label>
      <select id="ct-pto">${pontos.map(p => `<option value="${p.id}" ${c?.ponto_id===p.id?'selected':''}>${p.nome} (${p.tipo}) — ${p.status}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Valor mensal (R$)</label><input id="ct-val" type="number" step="0.01" value="${c ? (c.valor_cents/100).toFixed(2) : ''}" placeholder="0,00" /></div>
    <div class="form-row">
      <div class="form-group"><label>Data de início</label><input id="ct-ini" type="date" value="${c?.data_inicio||''}" /></div>
      <div class="form-group"><label>Data de término</label><input id="ct-fim" type="date" value="${c?.data_termino||''}" /></div>
    </div>
    ${edit ? `<div class="form-group"><label>Status</label>
      <select id="ct-status">
        <option ${c.status==='ATIVO'?'selected':''}>ATIVO</option>
        <option ${c.status==='PENDENTE'?'selected':''}>PENDENTE</option>
        <option ${c.status==='FINALIZADO'?'selected':''}>FINALIZADO</option>
        <option ${c.status==='CANCELADO'?'selected':''}>CANCELADO</option>
      </select></div>` : ''}
  `, `<button class="btn btn-secondary" onclick="closeModal()">Fechar</button>
      ${!edit ? `<button class="btn btn-primary" onclick="saveContrato(null)">Criar Contrato</button>` : `<button class="btn btn-blue" onclick="saveContrato(${c.id})">Atualizar</button>`}`);
}

async function saveContrato(id) {
  const body = {
    cliente_id: parseInt(document.getElementById('ct-cli').value),
    ponto_id: parseInt(document.getElementById('ct-pto').value),
    valor_cents: Math.round(parseFloat(document.getElementById('ct-val').value || 0) * 100),
    data_inicio: document.getElementById('ct-ini').value,
    data_termino: document.getElementById('ct-fim').value,
  };
  if (id) body.status = document.getElementById('ct-status').value;
  try {
    if (id) await api('PUT', `/contracts/${id}`, body); else await api('POST', '/contracts/', body);
    closeModal(); renderContratos();
  } catch(e) { alert(e.message); }
}

async function cancelContrato(id) {
  if (!confirm('Cancelar este contrato?')) return;
  await api('POST', `/contracts/${id}/cancel`).catch(e => alert(e.message));
  renderContratos();
}

function openRenovarModal(id) {
  openModal('Renovar Contrato', `
    <div class="form-group"><label>Nova data de término *</label><input id="renew-date" type="date" /></div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-success" onclick="renovarContrato(${id})">Renovar</button>`);
}

async function renovarContrato(id) {
  const dt = document.getElementById('renew-date').value;
  if (!dt) { alert('Informe a nova data de término'); return; }
  try {
    await api('POST', `/contracts/${id}/renew`, { data_termino: dt });
    closeModal(); renderContratos();
  } catch(e) { alert(e.message); }
}

// ───── PROPRIETÁRIOS ─────
async function renderProprietarios() {
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Proprietários</div><div class="page-sub">Donos dos pontos de mídia</div></div>
      <button class="btn btn-primary" onclick="openPropModal()">+ Novo Proprietário</button>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Lista de proprietários</span>
        <input class="search-input" placeholder="🔍 Buscar..." oninput="filterTable(this,'prop-table')" />
      </div>
      <div id="prop-table">${loading()}</div>
    </div>`;
  const rows = await api('GET', '/proprietarios/').catch(() => []);
  const tb = document.getElementById('prop-table');
  if (!rows.length) { tb.innerHTML = emptyState('🏢', 'Nenhum proprietário cadastrado'); return; }
  tb.innerHTML = `<table><thead><tr><th>Nome</th><th>Documento</th><th>Telefone</th><th>E-mail</th><th></th></tr></thead><tbody>
    ${rows.map(p => `<tr>
      <td><strong>${p.nome}</strong></td>
      <td>${p.documento || '—'}</td>
      <td>${p.telefone || '—'}</td>
      <td>${p.email || '—'}</td>
      <td><div class="actions-cell">
        <button class="btn btn-secondary btn-sm" onclick='openPropModal(${JSON.stringify(p)})'>Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProp(${p.id})">✕</button>
      </div></td>
    </tr>`).join('')}
  </tbody></table>`;
}

function openPropModal(p) {
  const edit = !!p;
  openModal(edit ? 'Editar Proprietário' : 'Novo Proprietário', `
    <div class="form-group"><label>Nome *</label><input id="pr-nome" value="${p?.nome||''}" /></div>
    <div class="form-row">
      <div class="form-group"><label>CPF / CNPJ</label><input id="pr-doc" value="${p?.documento||''}" /></div>
      <div class="form-group"><label>Telefone</label><input id="pr-tel" value="${p?.telefone||''}" /></div>
    </div>
    <div class="form-group"><label>E-mail</label><input id="pr-email" type="email" value="${p?.email||''}" /></div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProp(${p?.id||'null'})">${edit ? 'Salvar' : 'Criar'}</button>`);
}

async function saveProp(id) {
  const body = { nome: document.getElementById('pr-nome').value.trim(), documento: document.getElementById('pr-doc').value.trim(), telefone: document.getElementById('pr-tel').value.trim(), email: document.getElementById('pr-email').value.trim() };
  if (!body.nome) { alert('Nome obrigatório'); return; }
  try {
    if (id) await api('PUT', `/proprietarios/${id}`, body); else await api('POST', '/proprietarios/', body);
    closeModal(); renderProprietarios();
  } catch(e) { alert(e.message); }
}

async function deleteProp(id) {
  if (!confirm('Excluir este proprietário?')) return;
  await api('DELETE', `/proprietarios/${id}`).catch(e => alert(e.message));
  renderProprietarios();
}

// ───── SEARCH FILTER ─────
function filterTable(input, tableId) {
  const q = input.value.toLowerCase();
  const el = document.getElementById(tableId);
  el.querySelectorAll('tbody tr').forEach(tr => {
    tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
</script>
</body>
</html>
